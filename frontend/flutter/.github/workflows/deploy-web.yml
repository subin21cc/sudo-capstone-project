name: Deploy Web (GitHub Pages)

on:
  push:
    branches: [main]
  workflow_dispatch:

# Required for actions/deploy-pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deploy; don't cancel a running deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build (flutter build web)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.1'
          channel: stable
          cache: true

      - name: Pub get
        run: flutter pub get

      - name: Download drift WASM (sqlite3.wasm + drift_worker.js)
        run: bash tool/fetch_drift_wasm.sh

      - name: Build web (release, base-href /oncare-flutter/)
        env:
          # Default API_BASE_URL for the public preview build.
          # Override per-environment via repo secrets if needed.
          API_BASE_URL: ${{ vars.API_BASE_URL || 'https://dev.api.oncare.example.com' }}
        run: |
          flutter build web \
            --release \
            --base-href "/oncare-flutter/" \
            --dart-define=ENV=prod \
            --dart-define=API_BASE_URL=$API_BASE_URL

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Auto-provision the Pages site on first run (HTTP 404 from
          # `Get Pages site` happens until Pages is enabled). Requires
          # the `pages: write` permission already set on this job.
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
