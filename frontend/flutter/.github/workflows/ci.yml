name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify (format + analyze + test)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.1'
          channel: stable
          cache: true

      - name: Show versions
        run: |
          flutter --version
          dart --version

      - name: Pub get
        run: flutter pub get

      - name: Dart format
        run: dart format --set-exit-if-changed .

      - name: Flutter analyze
        run: flutter analyze

      - name: Flutter test (exclude golden — pixel-sensitive across hosts)
        run: flutter test --reporter expanded --exclude-tags golden
