<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 620" width="1100" height="620" role="img" aria-label="RAG 기반 AI 코칭 파이프라인">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', 'PingFang SC', 'Microsoft YaHei', sans-serif; }
  </style>
  <defs>
    <marker id="arr-blue"   markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
    <marker id="arr-green"  markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/></marker>
    <marker id="arr-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/></marker>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-opacity="0.08"/></filter>
  </defs>
  <rect width="1100" height="620" fill="#ffffff"/>
  <text x="550" y="42" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">RAG 기반 AI 코칭 파이프라인</text>
  <text x="550" y="66" text-anchor="middle" font-size="13" fill="#6b7280">질문 → 임베딩 → Pinecone 검색 → GPT-4o 컨텍스트 주입 → 맞춤 답변</text>
  <rect x="40" y="200" width="200" height="80" rx="10" ry="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#soft)"/>
  <text x="140.0" y="236.0" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">사용자 질문</text>
  <text x="140.0" y="254.0" text-anchor="middle" font-size="12" fill="#6b7280">“오늘 식단 괜찮아?”</text>
  <rect x="280" y="200" width="200" height="80" rx="10" ry="10" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5" filter="url(#soft)"/>
  <text x="380.0" y="236.0" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">임베딩</text>
  <text x="380.0" y="254.0" text-anchor="middle" font-size="12" fill="#6b7280">text-embedding-3-small</text>
  <path d="M 520 210 a 100.0 10 0 0 0 200 0 V 270 a 100.0 10 0 0 1 -200 0 Z" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <ellipse cx="620.0" cy="210" rx="100.0" ry="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="620.0" y="238.0" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Pinecone 시맨틱 검색</text>
  <text x="620.0" y="256.0" text-anchor="middle" font-size="12" fill="#6b7280">유사도 top-k</text>
  <rect x="760" y="200" width="200" height="80" rx="10" ry="10" fill="#faf5ff" stroke="#d8b4fe" stroke-width="1.5" filter="url(#soft)"/>
  <text x="860.0" y="236.0" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">GPT-4o</text>
  <text x="860.0" y="254.0" text-anchor="middle" font-size="12" fill="#6b7280">컨텍스트 주입 + 생성</text>
  <line x1="240" y1="240.0" x2="280" y2="240.0" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <line x1="480" y1="240.0" x2="520" y2="240.0" stroke="#9333ea" stroke-width="1.5" marker-end="url(#arr-purple)"/>
  <line x1="720" y1="240.0" x2="760" y2="240.0" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <rect x="380.0" y="360" width="480" height="88" rx="10" ry="10" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5" filter="url(#soft)"/>
  <text x="620.0" y="400.0" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Vector DB 인덱스: 사용자 누적 이력</text>
  <text x="620.0" y="418.0" text-anchor="middle" font-size="12" fill="#6b7280">인바디 · 이번 주 식단 · 운동 로그 · 질환 정보 · 목표 설정</text>
  <line x1="620.0" y1="360" x2="620.0" y2="284" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr-green)" stroke-dasharray="5,3"/>
  <rect x="570.0" y="310" width="100" height="18" fill="#ffffff" opacity="0.95" rx="3"/>
  <text x="620.0" y="323" text-anchor="middle" font-size="11" fill="#16a34a" font-weight="600">컨텍스트 검색</text>
  <rect x="110.0" y="490" width="880" height="90" rx="10" ry="10" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5" filter="url(#soft)"/>
  <text x="550.0" y="531.0" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">응답: “최근 3일간 탄수화물 목표 대비 12% 초과. 저녁에 닭가슴살 샐러드를 추천드립니다.”</text>
  <text x="550.0" y="549.0" text-anchor="middle" font-size="12" fill="#6b7280">*내 누적 기록 기준* 맞춤 조언 — 일반 영양학 답변과 차별화</text>
  <line x1="860.0" y1="280" x2="860.0" y2="486" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <g transform="translate(40, 590)">
    <line x1="0" y1="6" x2="28" y2="6" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr-blue)"/>
    <text x="36" y="10" font-size="11" fill="#6b7280">메인 흐름</text>
    <line x1="130" y1="6" x2="158" y2="6" stroke="#9333ea" stroke-width="1.5" marker-end="url(#arr-purple)"/>
    <text x="166" y="10" font-size="11" fill="#6b7280">임베딩 변환</text>
    <line x1="270" y1="6" x2="298" y2="6" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr-green)" stroke-dasharray="5,3"/>
    <text x="306" y="10" font-size="11" fill="#6b7280">컨텍스트 read</text>
  </g>
</svg>