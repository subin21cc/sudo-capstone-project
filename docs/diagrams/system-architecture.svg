<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 760" width="1100" height="760" role="img" aria-label="On-Care System Architecture">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', 'PingFang SC', 'Microsoft YaHei', sans-serif; }
  </style>
  <defs>
    <marker id="a-blue"  markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
    <marker id="a-gray"  markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/></marker>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-opacity="0.08"/></filter>
  </defs>
  <rect width="1100" height="760" fill="#ffffff"/>
  <text x="550" y="44" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">System Architecture</text>
  <text x="550" y="68" text-anchor="middle" font-size="13" fill="#6b7280">Flutter 클라이언트 · FastAPI 백엔드 · MySQL/Vision/RAG 서비스 · 외부 API 통합</text>
  <rect x="130" y="100" width="840" height="80" rx="10" ry="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#soft)"/>
  <text x="550.0" y="134.0" text-anchor="middle" font-size="15" font-weight="600" fill="#111827">Flutter Mobile App (iOS / Android / Web)</text>
  <text x="550.0" y="154.0" text-anchor="middle" font-size="12" fill="#6b7280">카메라 · 식단 · RAG 챗봇 · 운동 · 헬스장 · 일정 · 포인트 · 캘린더</text>
  <line x1="550" y1="180" x2="550" y2="236" stroke="#2563eb" stroke-width="1.8" marker-end="url(#a-blue)"/>
  <rect x="478" y="190" width="144" height="22" fill="#ffffff" opacity="0.95" rx="4" stroke="#bfdbfe" stroke-width="1"/>
  <text x="550" y="205" text-anchor="middle" font-size="12" font-weight="600" fill="#2563eb">HTTPS · JSON · JWT</text>
  <rect x="130" y="240" width="840" height="80" rx="10" ry="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5" filter="url(#soft)"/>
  <text x="550.0" y="274.0" text-anchor="middle" font-size="15" font-weight="600" fill="#111827">FastAPI Backend  ·  Docker  ·  AWS EC2</text>
  <text x="550.0" y="294.0" text-anchor="middle" font-size="12" fill="#6b7280">인증 JWT · 식단 API · 운동 API · RAG Pipeline · 포인트 관리</text>
  <path d="M 130 390 a 125.0 10 0 0 0 250 0 V 510 a 125.0 10 0 0 1 -250 0 Z" fill="#faf5ff" stroke="#d8b4fe" stroke-width="1.5" filter="url(#soft)"/>
  <ellipse cx="255.0" cy="390" rx="125.0" ry="10" fill="#faf5ff" stroke="#d8b4fe" stroke-width="1.5"/>
  <text x="255.0" y="418" text-anchor="middle" font-size="15" font-weight="600" fill="#111827">MySQL RDS</text>
  <text x="255.0" y="444" text-anchor="middle" font-size="11" font-weight="400" fill="#6b7280">사용자 · 식단 · 운동 · 포인트 · 일정</text>
  <text x="255.0" y="460" text-anchor="middle" font-size="11" font-weight="400" fill="#6b7280">드리프트 로컬 DB 동일 스키마</text>
  <rect x="425.0" y="380" width="250" height="140" rx="10" ry="10" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5" filter="url(#soft)"/>
  <text x="550.0" y="406" text-anchor="middle" font-size="15" font-weight="600" fill="#111827">Vision AI Pipeline</text>
  <text x="550.0" y="436" text-anchor="middle" font-size="11" font-weight="600" fill="#111827">YOLOv8 (1차 필터링)</text>
  <text x="550.0" y="454" text-anchor="middle" font-size="11" font-weight="400" fill="#6b7280">→ Gemini Vision API (분석)</text>
  <text x="550.0" y="472" text-anchor="middle" font-size="11" font-weight="400" fill="#6b7280">→ 공공데이터 식품영양성분 DB</text>
  <rect x="720.0" y="380" width="250" height="140" rx="10" ry="10" fill="#f0fdfa" stroke="#5eead4" stroke-width="1.5" filter="url(#soft)"/>
  <text x="845.0" y="406" text-anchor="middle" font-size="15" font-weight="600" fill="#111827">RAG Pipeline</text>
  <text x="845.0" y="436" text-anchor="middle" font-size="11" font-weight="600" fill="#111827">LangChain + Pinecone</text>
  <text x="845.0" y="454" text-anchor="middle" font-size="11" font-weight="400" fill="#6b7280">→ Closed-domain RAG</text>
  <text x="845.0" y="472" text-anchor="middle" font-size="11" font-weight="400" fill="#6b7280">→ GPT-4o 컨텍스트 생성</text>
  <line x1="255.0" y1="320" x2="255.0" y2="376" stroke="#2563eb" stroke-width="1.5" marker-end="url(#a-blue)"/>
  <line x1="550.0" y1="320" x2="550.0" y2="376" stroke="#2563eb" stroke-width="1.5" marker-end="url(#a-blue)"/>
  <line x1="845.0" y1="320" x2="845.0" y2="376" stroke="#2563eb" stroke-width="1.5" marker-end="url(#a-blue)"/>
  <rect x="130" y="580" width="840" height="120" rx="10" ry="10" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5" filter="url(#soft)"/>
  <text x="550.0" y="608" text-anchor="middle" font-size="15" font-weight="600" fill="#111827">External APIs</text>
  <rect x="149.16666666666666" y="640" width="145" height="36" rx="18" ry="18" fill="#fef3c7" stroke="#fcd34d" stroke-width="1.2"/>
  <text x="221.66666666666666" y="662.0" text-anchor="middle" font-size="11" fill="#111827" font-weight="600">카카오맵 API</text>
  <rect x="313.33333333333337" y="640" width="145" height="36" rx="18" ry="18" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.2"/>
  <text x="385.83333333333337" y="662.0" text-anchor="middle" font-size="11" fill="#111827" font-weight="600">공공데이터 식품DB</text>
  <rect x="477.5" y="640" width="145" height="36" rx="18" ry="18" fill="#fce7f3" stroke="#f9a8d4" stroke-width="1.2"/>
  <text x="550.0" y="662.0" text-anchor="middle" font-size="11" fill="#111827" font-weight="600">Google AI (Gemini)</text>
  <rect x="641.6666666666667" y="640" width="145" height="36" rx="18" ry="18" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1.2"/>
  <text x="714.1666666666667" y="662.0" text-anchor="middle" font-size="11" fill="#111827" font-weight="600">OpenAI (GPT-4o)</text>
  <rect x="805.8333333333334" y="640" width="145" height="36" rx="18" ry="18" fill="#fee2e2" stroke="#fca5a5" stroke-width="1.2"/>
  <text x="878.3333333333334" y="662.0" text-anchor="middle" font-size="11" fill="#111827" font-weight="600">Firebase FCM</text>
  <line x1="255.0" y1="520" x2="255.0" y2="576" stroke="#6b7280" stroke-width="1.3" marker-end="url(#a-gray)" stroke-dasharray="4,3"/>
  <line x1="550.0" y1="520" x2="550.0" y2="576" stroke="#6b7280" stroke-width="1.3" marker-end="url(#a-gray)" stroke-dasharray="4,3"/>
  <line x1="845.0" y1="520" x2="845.0" y2="576" stroke="#6b7280" stroke-width="1.3" marker-end="url(#a-gray)" stroke-dasharray="4,3"/>
  <g transform="translate(40, 720)">
    <line x1="0" y1="6" x2="28" y2="6" stroke="#2563eb" stroke-width="1.5" marker-end="url(#a-blue)"/>
    <text x="36" y="10" font-size="11" fill="#6b7280">내부 호출 (REST · 동기)</text>
    <line x1="200" y1="6" x2="228" y2="6" stroke="#6b7280" stroke-width="1.3" marker-end="url(#a-gray)" stroke-dasharray="4,3"/>
    <text x="236" y="10" font-size="11" fill="#6b7280">외부 API 연동 (비동기)</text>
  </g>
</svg>