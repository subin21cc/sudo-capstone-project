<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 880" width="960" height="880" role="img" aria-label="Vision AI 식단 인식 파이프라인">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', 'PingFang SC', 'Microsoft YaHei', sans-serif; }
  </style>
  <defs>
    <marker id="ar-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
    <marker id="ar-warn"  markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/></marker>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-opacity="0.08"/></filter>
  </defs>
  <rect width="960" height="880" fill="#ffffff"/>
  <text x="480" y="48" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Vision AI 식단 인식 파이프라인</text>
  <text x="480" y="72" text-anchor="middle" font-size="13" fill="#6b7280">사진 → 음식 필터 → 영양 분석 → DB 매핑 → 기록 저장</text>
  <rect x="330.0" y="105" width="300" height="64" rx="10" ry="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#soft)"/>
  <text x="480.0" y="133.0" text-anchor="middle" font-size="15" font-weight="600" fill="#111827">사용자 식단 사진 업로드</text>
  <text x="480.0" y="151.0" text-anchor="middle" font-size="12" fill="#6b7280">JPEG / PNG · 모바일 카메라 또는 갤러리</text>
  <rect x="330.0" y="220" width="300" height="64" rx="10" ry="10" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5" filter="url(#soft)"/>
  <text x="480.0" y="248.0" text-anchor="middle" font-size="15" font-weight="600" fill="#111827">1. YOLOv8 — 음식 이미지 필터링</text>
  <text x="480.0" y="266.0" text-anchor="middle" font-size="12" fill="#6b7280">온디바이스 / 경량 서버에서 1차 판별</text>
  <rect x="700" y="220" width="220" height="64" rx="10" ry="10" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5" filter="url(#soft)"/>
  <text x="810.0" y="248.0" text-anchor="middle" font-size="13" font-weight="600" fill="#111827">비음식 이미지 반려</text>
  <text x="810.0" y="266.0" text-anchor="middle" font-size="12" fill="#6b7280">API 호출 차단 · 비용 절감</text>
  <path d="M 630.0 252 H 700" fill="none" stroke="#dc2626" stroke-width="1.5" marker-end="url(#ar-warn)"/>
  <rect x="640" y="244" width="56" height="18" fill="#ffffff" opacity="0.95" rx="3"/>
  <text x="668" y="257" text-anchor="middle" font-size="11" fill="#dc2626" font-weight="600">비음식</text>
  <rect x="330.0" y="360" width="300" height="64" rx="10" ry="10" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5" filter="url(#soft)"/>
  <text x="480.0" y="388.0" text-anchor="middle" font-size="15" font-weight="600" fill="#111827">2. Gemini Vision API — 음식 분석</text>
  <text x="480.0" y="406.0" text-anchor="middle" font-size="12" fill="#6b7280">음식 종류 식별 · 추정 섭취량 분석</text>
  <path d="M 330.0 510 a 150.0 10 0 0 0 300 0 V 568 a 150.0 10 0 0 1 -300 0 Z" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <ellipse cx="480.0" cy="510" rx="150.0" ry="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="480.0" y="537.0" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">3. 공공데이터 식품영양성분 DB</text>
  <text x="480.0" y="555.0" text-anchor="middle" font-size="12" fill="#6b7280">한국 음식 영양소 매핑</text>
  <path d="M 330.0 650 a 150.0 10 0 0 0 300 0 V 708 a 150.0 10 0 0 1 -300 0 Z" fill="#faf5ff" stroke="#d8b4fe" stroke-width="1.5"/>
  <ellipse cx="480.0" cy="650" rx="150.0" ry="10" fill="#faf5ff" stroke="#d8b4fe" stroke-width="1.5"/>
  <text x="480.0" y="677.0" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">4. MySQL RDS — 식단 기록 저장</text>
  <text x="480.0" y="695.0" text-anchor="middle" font-size="12" fill="#6b7280">사용자별 일자/끼니 인덱싱</text>
  <rect x="120" y="780" width="720" height="64" rx="10" ry="10" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5" filter="url(#soft)"/>
  <text x="480.0" y="808.0" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">결과: “닭볶음밥 1인분 · 450 kcal · 탄수화물 62g · 단백질 18g · 지방 14g”</text>
  <text x="480.0" y="826.0" text-anchor="middle" font-size="12" fill="#6b7280">사용자에게 즉시 반환 및 일일 영양 요약에 반영</text>
  <line x1="480" y1="170" x2="480" y2="218" stroke="#2563eb" stroke-width="1.5" marker-end="url(#ar-blue)"/>
  <rect x="454.0" y="186.0" width="52" height="16" fill="#ffffff" opacity="0.95" rx="3"/>
  <text x="480" y="198.0" text-anchor="middle" font-size="11" fill="#2563eb" font-weight="600">사진 입력</text>
  <line x1="480" y1="285" x2="480" y2="358" stroke="#2563eb" stroke-width="1.5" marker-end="url(#ar-blue)"/>
  <rect x="442.0" y="313.5" width="76" height="16" fill="#ffffff" opacity="0.95" rx="3"/>
  <text x="480" y="325.5" text-anchor="middle" font-size="11" fill="#2563eb" font-weight="600">음식 판별 OK</text>
  <line x1="480" y1="425" x2="480" y2="498" stroke="#2563eb" stroke-width="1.5" marker-end="url(#ar-blue)"/>
  <rect x="438.0" y="453.5" width="84" height="16" fill="#ffffff" opacity="0.95" rx="3"/>
  <text x="480" y="465.5" text-anchor="middle" font-size="11" fill="#2563eb" font-weight="600">음식명 + 추정량</text>
  <line x1="480" y1="580" x2="480" y2="638" stroke="#2563eb" stroke-width="1.5" marker-end="url(#ar-blue)"/>
  <rect x="450.0" y="601.0" width="60" height="16" fill="#ffffff" opacity="0.95" rx="3"/>
  <text x="480" y="613.0" text-anchor="middle" font-size="11" fill="#2563eb" font-weight="600">영양소 계산</text>
  <line x1="480" y1="720" x2="480" y2="778" stroke="#2563eb" stroke-width="1.5" marker-end="url(#ar-blue)"/>
  <rect x="454.0" y="741.0" width="52" height="16" fill="#ffffff" opacity="0.95" rx="3"/>
  <text x="480" y="753.0" text-anchor="middle" font-size="11" fill="#2563eb" font-weight="600">최종 출력</text>
  <g transform="translate(40, 836)">
    <line x1="0" y1="6" x2="28" y2="6" stroke="#2563eb" stroke-width="1.5" marker-end="url(#ar-blue)"/>
    <text x="36" y="10" font-size="11" fill="#6b7280">메인 데이터 흐름</text>
    <line x1="160" y1="6" x2="188" y2="6" stroke="#dc2626" stroke-width="1.5" marker-end="url(#ar-warn)"/>
    <text x="196" y="10" font-size="11" fill="#6b7280">비음식 반려</text>
  </g>
</svg>